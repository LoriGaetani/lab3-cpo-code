name: CI

# Trigger conditions: run on push or pull request to main/master
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

# In case of concurrent pipeline (multiple push), skip the old one
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------
  # JOB 0: Detect which modules changed
  # -------------------------------------------------------------
  changes:
    name: Detect changed modules
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      global: ${{ steps.filter.outputs.global }}
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            global:
              - '.github/workflows/**'
              - 'docker-compose*.yml'
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'

  # -------------------------------------------------------------
  # JOB 1: Frontend (React + Vite + TypeScript)
  # -------------------------------------------------------------
  frontend:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' || needs.changes.outputs.global == 'true' }}
    name: Frontend (React/Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  # -------------------------------------------------------------
  # JOB 2: Backend Service (Kotlin/Java + Spring Boot)
  # -------------------------------------------------------------
  backend:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' || needs.changes.outputs.global == 'true' }}
    name: Backend Service (Spring Boot)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Compile and assemble the project; -x test skips tests
      - name: Build
        run: ./gradlew build -x test

  release:
    name: Release and publish Docker images
    needs: [ changes, frontend, backend ]
    if: >
      ${{
        always() &&
        github.event_name == 'push' &&
        github.ref == 'refs/heads/master' &&
        !cancelled() &&
        !failure()
      }}
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install release dependencies
        run: npm ci

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Check if a new release was created
        id: version
        run: |
          if [ ! -f .version ]; then
            echo "released=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          VERSION="$(cat .version)"
          echo "released=true" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install just
        if: ${{ steps.version.outputs.released == 'true' }}
        uses: extractions/setup-just@v3

      - name: Login to Docker Hub
        if: ${{ steps.version.outputs.released == 'true' }}
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: just docker-login

      - name: Build and push frontend image
        if: >
          ${{
            steps.version.outputs.released == 'true' &&
            (
              needs.changes.outputs.frontend == 'true' ||
              needs.changes.outputs.global == 'true'
            )
          }}
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: just docker-build-push frontend

      - name: Build and push backend image
        if: >
          ${{
            steps.version.outputs.released == 'true' &&
            (
              needs.changes.outputs.backend == 'true' ||
              needs.changes.outputs.global == 'true'
            )
          }}
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: just docker-build-push backend